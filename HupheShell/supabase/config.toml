# A string used to distinguish different Supabase projects on the same host.
project_id = "rnluzxpsduphqspqnwbe"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:1420"
jwt_expiry = 3600
enable_refresh_token_rotation = true

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
